<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Logistics Dashboard</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#222;min-height:100vh}

  /* ── Header ── */
  .header{background:linear-gradient(135deg,#1a237e 0%,#283593 60%,#3949ab 100%);
          padding:18px 32px;display:flex;align-items:center;gap:16px;
          box-shadow:0 2px 8px rgba(0,0,0,.3)}
  .header h1{color:#fff;font-size:1.4rem;font-weight:700;letter-spacing:.5px}
  .header span{color:#90caf9;font-size:.85rem;margin-left:auto}

  /* ── Main ── */
  .main{max-width:1400px;margin:0 auto;padding:24px 20px}

  /* ── KPI Cards ── */
  .kpi-row{display:flex;gap:16px;margin-bottom:28px;flex-wrap:wrap}
  .kpi-card{background:#fff;border-radius:12px;padding:18px 24px;flex:1;min-width:160px;
            box-shadow:0 2px 8px rgba(0,0,0,.08);border-top:4px solid #3949ab}
  .kpi-card.lf{border-top-color:#1976d2}
  .kpi-card.hf{border-top-color:#388e3c}
  .kpi-card.dd{border-top-color:#f57c00}
  .kpi-label{font-size:.75rem;color:#888;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
  .kpi-value{font-size:2rem;font-weight:700;color:#1a237e}
  .kpi-sub{font-size:.75rem;color:#aaa;margin-top:4px}

  /* ── Section Title ── */
  .section-title{font-size:1rem;font-weight:700;color:#1a237e;
                 margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .section-title::before{content:'';display:inline-block;width:4px;height:18px;
                          background:#3949ab;border-radius:2px}

  /* ── TYPE Filter ── */
  .filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .filter-btn{padding:6px 18px;border-radius:20px;border:2px solid #ddd;
              background:#fff;cursor:pointer;font-size:.82rem;font-weight:600;
              color:#555;transition:all .18s}
  .filter-btn.active,.filter-btn:hover{border-color:#3949ab;background:#3949ab;color:#fff}
  .filter-btn.lf.active,.filter-btn.lf:hover{border-color:#1976d2;background:#1976d2;color:#fff}
  .filter-btn.hf.active,.filter-btn.hf:hover{border-color:#388e3c;background:#388e3c;color:#fff}
  .filter-btn.dd.active,.filter-btn.dd:hover{border-color:#f57c00;background:#f57c00;color:#fff}

  /* ── Week Grid ── */
  .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:32px}
  @media(max-width:900px){.week-grid{grid-template-columns:repeat(4,1fr)}}
  @media(max-width:600px){.week-grid{grid-template-columns:repeat(2,1fr)}}

  .day-col{background:#fff;border-radius:10px;padding:12px;
           box-shadow:0 2px 6px rgba(0,0,0,.07);min-height:80px}
  .day-col.today{border:2px solid #3949ab;background:#f5f6ff}
  .day-header{font-size:.75rem;font-weight:700;color:#888;margin-bottom:8px;
              display:flex;justify-content:space-between}
  .day-header .dow{color:#1a237e;font-size:.9rem}

  .cont-card{border-radius:8px;padding:8px 10px;margin-bottom:7px;cursor:pointer;
             transition:transform .15s,box-shadow .15s;border-left:4px solid transparent}
  .cont-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
  .cont-card.lf{background:#e3f2fd;border-left-color:#1976d2}
  .cont-card.hf{background:#e8f5e9;border-left-color:#388e3c}
  .cont-card.dd{background:#fff3e0;border-left-color:#f57c00}
  .cont-card.active{box-shadow:0 0 0 3px #3949ab55;transform:translateY(-2px)}

  .cont-card .cont-type{font-size:.65rem;font-weight:700;color:#fff;padding:1px 6px;
                        border-radius:10px;display:inline-block;margin-bottom:4px}
  .type-lf{background:#1976d2}.type-hf{background:#388e3c}.type-dd{background:#f57c00}
  .cont-card .cont-no{font-size:.7rem;color:#333;font-weight:600;word-break:break-all}
  .cont-card .cont-bl{font-size:.65rem;color:#888;margin-top:2px}
  .cont-card .cont-carrier{font-size:.62rem;color:#aaa;margin-top:2px;
                            white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cont-card .cont-stat{font-size:.62rem;color:#fff;background:#78909c;
                         padding:1px 6px;border-radius:10px;display:inline-block;margin-top:4px}

  .no-cont{color:#ccc;font-size:.78rem;text-align:center;padding:12px 0}

  /* ── Article List Panel ── */
  .article-panel{background:#fff;border-radius:12px;padding:20px 24px;
                 margin-bottom:32px;box-shadow:0 2px 8px rgba(0,0,0,.08);
                 display:none}
  .article-panel.visible{display:block}
  .article-panel-header{display:flex;align-items:center;justify-content:space-between;
                         margin-bottom:14px;flex-wrap:wrap;gap:8px}
  .article-panel-title{font-size:.95rem;font-weight:700;color:#1a237e}
  .article-panel-meta{font-size:.8rem;color:#888}
  .article-panel-close{cursor:pointer;color:#aaa;font-size:1.2rem;line-height:1;
                        padding:4px 8px;border-radius:6px;border:none;background:none}
  .article-panel-close:hover{background:#f0f0f0;color:#555}

  .article-table{width:100%;border-collapse:collapse;font-size:.82rem}
  .article-table th{background:#f5f6ff;color:#1a237e;font-weight:700;
                     padding:8px 10px;text-align:left;border-bottom:2px solid #e0e0e0}
  .article-table td{padding:7px 10px;border-bottom:1px solid #f0f0f0;color:#333}
  .article-table tr:last-child td{border-bottom:none}
  .article-table tr:hover td{background:#fafbff}
  .badge-type{font-size:.65rem;font-weight:700;color:#fff;padding:2px 7px;
              border-radius:10px;display:inline-block}
  .empty-articles{color:#bbb;text-align:center;padding:20px;font-size:.85rem}

  /* ── Search Section ── */
  .search-section{background:#fff;border-radius:12px;padding:20px 24px;
                  margin-bottom:24px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
  .search-wrap{position:relative;max-width:480px}
  .search-wrap input{width:100%;padding:10px 44px 10px 16px;border:2px solid #ddd;
                     border-radius:8px;font-size:.95rem;outline:none;transition:border .2s}
  .search-wrap input:focus{border-color:#3949ab}
  .search-wrap .search-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);
                             color:#aaa;font-size:1.1rem;pointer-events:none}
  .ac-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ddd;
            border-radius:0 0 8px 8px;max-height:240px;overflow-y:auto;
            z-index:100;display:none;box-shadow:0 4px 12px rgba(0,0,0,.1)}
  .ac-item{padding:8px 14px;cursor:pointer;font-size:.85rem;border-bottom:1px solid #f5f5f5}
  .ac-item:hover,.ac-item.sel{background:#e8eaf6}
  .ac-item .ac-no{font-weight:700;color:#1a237e;margin-right:8px}
  .ac-item .ac-name{color:#555}

  /* ── Result Table ── */
  .result-table-wrap{overflow-x:auto;margin-top:16px}
  .result-table{width:100%;border-collapse:collapse;font-size:.82rem;min-width:700px}
  .result-table th{background:#1a237e;color:#fff;padding:9px 12px;
                   font-weight:600;text-align:left;white-space:nowrap}
  .result-table td{padding:8px 12px;border-bottom:1px solid #f0f0f0;vertical-align:top}
  .result-table tr:hover td{background:#f5f6ff}
  .result-count{font-size:.8rem;color:#888;margin-top:10px}
  .no-result{color:#bbb;text-align:center;padding:24px;font-size:.9rem}
  .planned-date{color:#1565c0;font-weight:600}

  /* ── Scroll hint ── */
  .scroll-hint{font-size:.72rem;color:#bbb;margin-top:6px;text-align:right}
</style>
</head>
<body>

<div class="header">
  <div>🚢</div>
  <h1>Logistics Dashboard</h1>
  <span id="todayLabel"></span>
</div>

<div class="main">

  <!-- KPI Row -->
  <div class="kpi-row" id="kpiRow"></div>

  <!-- Week Containers -->
  <div class="section-title">📦 이번 주 컨테이너 일정</div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('ALL')">ALL</button>
    <button class="filter-btn lf"     onclick="setFilter('LF')">LF</button>
    <button class="filter-btn hf"     onclick="setFilter('HF')">HF</button>
    <button class="filter-btn dd"     onclick="setFilter('DD')">DD</button>
  </div>

  <div class="week-grid" id="weekGrid"></div>

  <!-- Article List Panel (shown on container click) -->
  <div class="article-panel" id="articlePanel">
    <div class="article-panel-header">
      <div>
        <div class="article-panel-title" id="panelTitle"></div>
        <div class="article-panel-meta" id="panelMeta"></div>
      </div>
      <button class="article-panel-close" onclick="closePanel()">✕</button>
    </div>
    <div id="panelTableWrap"></div>
  </div>

  <!-- Article Search -->
  <div class="section-title">🔍 아티클 번호 검색</div>
  <div class="search-section">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="아티클 번호 또는 품명 입력..."
             oninput="onInput(this.value)" onkeydown="onKey(event)" autocomplete="off">
      <span class="search-icon">🔍</span>
      <div class="ac-list" id="acList"></div>
    </div>
    <div class="result-table-wrap" id="resultWrap" style="display:none">
      <table class="result-table">
        <thead>
          <tr>
            <th>ItemNo</th><th>품명</th><th>PA</th><th>TYPE</th>
            <th>LatestRCVDate</th><th>매장 입고 예정일</th>
            <th>BL</th><th>Container</th>
            <th>SSD</th><th>EDS</th>
          </tr>
        </thead>
        <tbody id="resultBody"></tbody>
      </table>
      <div class="result-count" id="resultCount"></div>
    </div>
    <div class="scroll-hint" id="scrollHint"></div>
  </div>

</div>

// ── State ──
let currentFilter = 'ALL';
let selectedContainer = null;
let acItems = [];
let acSel = -1;

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('todayLabel').textContent =
    'Today: ' + new Date('2026-07-10').toLocaleDateString('ko-KR');
  buildKPI();
  buildWeek();
});

// ── KPI ──
function buildKPI() {
  const types = ['LF','HF','DD'];
  const colors = ['lf','hf','dd'];
  const labels = {LF:'LF 컨테이너',HF:'HF 컨테이너',DD:'DD 컨테이너'};

  let html = `<div class="kpi-card">
    <div class="kpi-label">이번 주 전체 컨테이너</div>
    <div class="kpi-value">${weekContainers.length}</div>
    <div class="kpi-sub">7/10 ~ 7/16</div>
  </div>`;

  types.forEach((t,i)=>{
    const cnt = weekContainers.filter(c=>c.type===t).length;
    html += `<div class="kpi-card ${colors[i]}">
      <div class="kpi-label">${labels[t]}</div>
      <div class="kpi-value">${cnt}</div>
      <div class="kpi-sub">컨테이너</div>
    </div>`;
  });

  document.getElementById('kpiRow').innerHTML = html;
}

// ── Week Grid ──
const DAYS = ['일','월','화','수','목','금','토'];
const DATES = [];
for(let i=0;i<7;i++){
  const d = new Date('2026-07-10');
  d.setDate(d.getDate()+i);
  DATES.push(d);
}

function buildWeek() {
  const filtered = currentFilter==='ALL'
    ? weekContainers
    : weekContainers.filter(c=>c.type===currentFilter);

  let html = '';
  DATES.forEach((d,idx)=>{
    const dateStr = d.toISOString().slice(0,10);
    const dow = DAYS[d.getDay()];
    const mo  = d.getMonth()+1;
    const da  = d.getDate();
    const isToday = idx===0;
    const dayCont = filtered.filter(c=>c.rcvDate===dateStr);

    html += `<div class="day-col ${isToday?'today':''}">
      <div class="day-header">
        <span class="dow">${dow}</span>
        <span>${mo}/${da}</span>
      </div>`;

    if(dayCont.length===0){
      html += `<div class="no-cont">-</div>`;
    } else {
      dayCont.forEach(c=>{
        const typeLow = c.type.toLowerCase();
        const isActive = selectedContainer===c.container ? 'active' : '';
        html += `<div class="cont-card ${typeLow} ${isActive}"
                      onclick="selectContainer('${c.container}')">
          <span class="cont-type type-${typeLow}">${c.type}</span>
          <div class="cont-no">${c.container}</div>
          <div class="cont-bl">${c.bl}</div>
          <div class="cont-carrier" title="${c.carrier}">${c.carrier}</div>
          <span class="cont-stat">통관: ${c.csmStat}</span>
        </div>`;
      });
    }
    html += `</div>`;
  });
  document.getElementById('weekGrid').innerHTML = html;
}

// ── Container Select → Article Panel ──
function selectContainer(contNo) {
  if(selectedContainer === contNo){
    closePanel();
    return;
  }
  selectedContainer = contNo;
  buildWeek(); // re-render to show active state

  const cont = weekContainers.find(c=>c.container===contNo);
  if(!cont) return;

  const panel = document.getElementById('articlePanel');
  const typeLow = cont.type.toLowerCase();
  document.getElementById('panelTitle').textContent =
    `📦 ${cont.container}  (${cont.type})`;
  document.getElementById('panelMeta').textContent =
    `BL: ${cont.bl}  |  운송사: ${cont.carrier}  |  입고 예정일: ${cont.rcvDate}  |  통관: ${cont.csmStat}  |  CBM: ${cont.cbm}`;

  if(!cont.articles || cont.articles.length===0){
    document.getElementById('panelTableWrap').innerHTML =
      `<div class="empty-articles">아티클 정보 없음</div>`;
  } else {
    let rows = cont.articles.map(a=>{
      const typL = a.type.toLowerCase();
      return `<tr>
        <td><strong>${a.itemNo}</strong></td>
        <td>${a.itemName}</td>
        <td><span class="badge-type type-${typL}">${a.type}</span></td>
        <td style="text-align:right">${a.qty.toLocaleString()}</td>
      </tr>`;
    }).join('');
    document.getElementById('panelTableWrap').innerHTML = `
      <table class="article-table">
        <thead><tr>
          <th>ItemNo</th><th>품명</th><th>TYPE</th><th style="text-align:right">수량(pcs)</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="result-count" style="margin-top:8px">총 ${cont.articles.length}개 아티클</div>`;
  }

  panel.classList.add('visible');
  panel.scrollIntoView({behavior:'smooth', block:'start'});
}

function closePanel(){
  selectedContainer = null;
  document.getElementById('articlePanel').classList.remove('visible');
  buildWeek();
}

// ── Filter ──
function setFilter(f){
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>{
    b.classList.remove('active');
    if(b.textContent.trim()===f) b.classList.add('active');
  });
  buildWeek();
}

// ── Search ──
function onInput(val){
  const ac = document.getElementById('acList');
  acSel = -1;
  if(val.length < 2){ ac.style.display='none'; acItems=[]; return; }
  const q = val.toLowerCase();
  acItems = roiData.filter(r=>
    r.itemNo.includes(val) || r.itemName.toLowerCase().includes(q)
  ).slice(0,20);

  if(acItems.length===0){ ac.style.display='none'; return; }
  ac.innerHTML = acItems.map((r,i)=>
    `<div class="ac-item" onmousedown="selectAC(${i})">
      <span class="ac-no">${r.itemNo}</span>
      <span class="ac-name">${r.itemName}</span>
    </div>`
  ).join('');
  ac.style.display='block';
}

function onKey(e){
  const items = document.querySelectorAll('.ac-item');
  if(e.key==='ArrowDown'){acSel=Math.min(acSel+1,items.length-1);}
  else if(e.key==='ArrowUp'){acSel=Math.max(acSel-1,0);}
  else if(e.key==='Enter'){
    if(acSel>=0) selectAC(acSel);
    else doSearch(document.getElementById('searchInput').value);
    return;
  } else return;
  items.forEach((el,i)=>el.classList.toggle('sel',i===acSel));
  e.preventDefault();
}

function selectAC(i){
  const r = acItems[i];
  document.getElementById('searchInput').value = r.itemNo;
  document.getElementById('acList').style.display='none';
  doSearch(r.itemNo);
}

function doSearch(val){
  document.getElementById('acList').style.display='none';
  if(!val){ document.getElementById('resultWrap').style.display='none'; return; }
  const q = val.toLowerCase();
  const res = roiData.filter(r=>
    r.itemNo.includes(val) || r.itemName.toLowerCase().includes(q)
  );

  const tbody = document.getElementById('resultBody');
  if(res.length===0){
    tbody.innerHTML = `<tr><td colspan="10" class="no-result">검색 결과 없음</td></tr>`;
  } else {
    tbody.innerHTML = res.map(r=>{
      const typLow = r.type.toLowerCase();
      const planned = r.plannedRcvDate
        ? `<span class="planned-date">${r.plannedRcvDate}</span>` : '-';
      return `<tr>
        <td><strong>${r.itemNo}</strong></td>
        <td>${r.itemName}</td>
        <td>${r.pa}</td>
        <td><span class="badge-type type-${typLow}">${r.type}</span></td>
        <td>${r.latestRcvDate||'-'}</td>
        <td>${planned}</td>
        <td style="font-size:.75rem">${r.bl||'-'}</td>
        <td style="font-size:.75rem;word-break:break-all">${r.container||'-'}</td>
        <td>${r.ssd||'-'}</td>
        <td>${r.eds||'-'}</td>
      </tr>`;
    }).join('');
  }

  document.getElementById('resultCount').textContent = `총 ${res.length}건`;
  document.getElementById('resultWrap').style.display='block';
  document.getElementById('scrollHint').textContent =
    res.length>5 ? '← 좌우 스크롤 가능' : '';
}
</script>
